<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI vs Human</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  height:100dvh;
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  color:#fff;
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
  touch-action:none;
}
body{position:fixed;inset:0}
canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
:root{
  --safe-top:max(10px, env(safe-area-inset-top));
  --safe-left:max(12px, env(safe-area-inset-left));
  --safe-right:max(12px, env(safe-area-inset-right));
  --safe-bottom:max(10px, env(safe-area-inset-bottom));
}
.control-panel{
  position:fixed;
  top:var(--safe-top);
  left:var(--safe-left);
  right:var(--safe-right);
  z-index:30;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}
.control-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;pointer-events:auto}
.pill{
  display:flex;
  gap:4px;
  align-items:center;
  flex-wrap:wrap;
  max-width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:4px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
button{
  appearance:none;
  border:none;
  background:transparent;
  color:rgba(255,255,255,0.58);
  font-family:inherit;
  cursor:pointer;
  border-radius:10px;
  transition:all .2s ease;
  white-space:nowrap;
  touch-action:manipulation;
}
button:hover{color:rgba(255,255,255,0.85)}
.data-btn,.mode-btn,.grp-btn{font-size:12px;letter-spacing:.35px}
.data-btn,.mode-btn{padding:9px 14px}
.grp-btn{padding:9px 16px}
.data-btn.active,.mode-btn.active,.grp-btn.active{background:rgba(255,255,255,0.12);color:#fff}
.grp-btn.ai-on{background:rgba(35,198,211,0.20);color:#23c6d3;box-shadow:inset 0 0 0 1px rgba(35,198,211,0.18)}
.grp-btn.hu-on{background:rgba(255,159,67,0.20);color:#ff9f43;box-shadow:inset 0 0 0 1px rgba(255,159,67,0.18)}
.grp-btn.off{color:rgba(255,255,255,0.25)}
#legend{
  position:fixed;
  top:calc(var(--safe-top) + 114px);
  right:var(--safe-right);
  background:rgba(0,0,0,0.86);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:10px;
  padding:12px 16px;
  pointer-events:none;
  z-index:10;
  opacity:0;
  transition:opacity .35s ease;
  max-width:min(260px, calc(100vw - 24px));
}
#legend.visible{opacity:1}
.legend-title{font-size:14px;font-weight:bold;margin-bottom:6px;color:rgba(255,255,255,0.92)}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;line-height:1.7}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{color:rgba(255,255,255,0.76)}
#mini-note{
  position:fixed;
  left:var(--safe-left);
  top:0;
  color:rgba(255,255,255,0.46);
  font-size:8px;
  letter-spacing:.15px;
  line-height:1;
  pointer-events:none;
  z-index:10;
}
#credit{position:fixed;left:var(--safe-left);bottom:var(--safe-bottom);height:14px;min-width:120px;color:transparent;pointer-events:none;z-index:10}
@media (max-width:768px){
  .control-panel{gap:7px}
  .control-row{gap:8px}
  .pill{gap:2px;padding:4px}
  .data-btn,.mode-btn,.grp-btn{font-size:11px;letter-spacing:.2px;padding:8px 12px}
  .mode-row #buttons{width:100%}
  .group-row{margin-top:-2px}
  #legend{top:auto;right:auto;left:var(--safe-left);bottom:calc(var(--safe-bottom) + 72px);padding:10px 12px;max-width:min(280px, calc(100vw - 24px))}
  .legend-title{font-size:12px}
  .legend-item{font-size:11px;line-height:1.5}
  .legend-dot{width:7px;height:7px}
  #mini-note{font-size:7.5px}
}
</style>
</head>
<body>
<canvas id="chart"></canvas>

<div class="control-panel" id="control-panel">
  <div class="control-row data-row">
    <div class="pill" id="data-toggle">
      <button class="data-btn active" data-axes="bs">Brightness / Saturation</button>
      <button class="data-btn" data-axes="bh">Brightness / Hue</button>
      <button class="data-btn" data-axes="sh">Saturation / Hue</button>
    </div>
  </div>

  <div class="control-row mode-row">
    <div class="pill" id="buttons">
      <button class="mode-btn active" data-cat="all">Tümü</button>
      <button class="mode-btn" data-cat="portrait">Portre</button>
      <button class="mode-btn" data-cat="landscape">Manzara</button>
      <button class="mode-btn" data-cat="abstract">Soyut</button>
      <button class="mode-btn" data-cat="cityscape">Kentsel</button>
      <button class="mode-btn" data-cat="thumbnail">Thumbnail</button>
      <button class="mode-btn" data-cat="grid">Grid</button>
    </div>
  </div>

  <div class="control-row group-row">
    <div class="pill" id="group-toggle">
      <button class="grp-btn ai-on" data-g="AI">AI</button>
      <button class="grp-btn hu-on" data-g="Human">İnsan</button>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-title">Kategori</div>
</div>
<div id="mini-note">AI · Human</div>
<div id="credit">&nbsp;</div>

<script>
const AI_COLOR = '#23c6d3';
const HUMAN_COLOR = '#ff9f43';
const catColors = {
  portrait: '#E0A16D',
  landscape: '#8CBF9F',
  abstract: '#E7C98A',
  cityscape: '#7D88B8'
};
const catLabels = {
  portrait: 'Portre',
  landscape: 'Manzara',
  abstract: 'Soyut',
  cityscape: 'Kentsel'
};

const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d', { alpha: false });
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'low';
const legendEl = document.getElementById('legend');
const miniNote = document.getElementById('mini-note');
const dataToggle = document.getElementById('data-toggle');
const controlPanel = document.getElementById('control-panel');

for (const [cat, color] of Object.entries(catColors)) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${catLabels[cat]}</span>`;
  legendEl.appendChild(item);
}
const sep = document.createElement('div');
sep.style.height = '6px';
legendEl.appendChild(sep);
[['AI', AI_COLOR], ['İnsan', HUMAN_COLOR]].forEach(([label, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}"></span><span class="legend-label">${label}</span>`;
  legendEl.appendChild(item);
});

let allData = [];
let activeGroups = new Set(['AI', 'Human']);
let activeCat = 'all';
let thumbMode = false;
let gridMode = false;
let currentAxes = 'bs';
let transform = d3.zoomIdentity;

let W = 0;
let H = 0;
let DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
let margin = { top: 154, right: 16, bottom: 44, left: 44 };
let layoutMetrics = {
  panelBottom: 0, topPad: 154, bottomPad: 44, leftPad: 44, rightPad: 16,
  gridTop: 154, gridBottom: 34, gridLeft: 8, gridRight: 8
};

const imgCache = {};
const sortedCache = new Map();
let drawScheduled = false;
let syncScheduled = false;
let syncResetZoom = false;
let gridCacheDirty = true;
let thumbCacheDirty = true;
let gridRebuildTimer = null;

const gridCacheCanvas = document.createElement('canvas');
const gridCacheCtx = gridCacheCanvas.getContext('2d', { alpha: false });
gridCacheCtx.imageSmoothingEnabled = true;
gridCacheCtx.imageSmoothingQuality = 'low';

const thumbCacheCanvas = document.createElement('canvas');
const thumbCacheCtx = thumbCacheCanvas.getContext('2d', { alpha: false });
thumbCacheCtx.imageSmoothingEnabled = true;
thumbCacheCtx.imageSmoothingQuality = 'low';

function isMobile(){ return W < 768; }
function getCssPixel(varName, fallback){
  const value = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  const n = parseFloat(value);
  return Number.isFinite(n) ? n : fallback;
}
function getViewportSize(){
  const docEl = document.documentElement;
  return {
    width: Math.max(docEl.clientWidth || 0, window.innerWidth || 0, 320),
    height: Math.max(docEl.clientHeight || 0, window.innerHeight || 0, 320)
  };
}
function resizeCanvas(){
  const vp = getViewportSize();
  W = Math.max(320, vp.width);
  H = Math.max(320, vp.height);
  DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'low';
}
function updateLayoutMetrics(){
  const safeBottom = getCssPixel('--safe-bottom', 10);
  const panelRect = controlPanel.getBoundingClientRect();
  const panelBottom = Math.ceil(panelRect.bottom);
  layoutMetrics = {
    panelBottom,
    topPad: Math.max(panelBottom + (isMobile() ? 14 : 18), isMobile() ? 154 : 118),
    bottomPad: Math.max(safeBottom + (isMobile() ? 42 : 56), isMobile() ? 42 : 56),
    leftPad: isMobile() ? 44 : 68,
    rightPad: isMobile() ? 16 : 38,
    gridTop: panelBottom + (isMobile() ? 12 : 18),
    gridBottom: Math.max(safeBottom + (isMobile() ? 30 : 28), isMobile() ? 30 : 28),
    gridLeft: isMobile() ? 8 : 52,
    gridRight: isMobile() ? 8 : 16
  };
}

let baseScaleX;
let baseScaleY;
function buildScales(){
  updateLayoutMetrics();
  margin = {
    top: layoutMetrics.topPad,
    right: layoutMetrics.rightPad,
    bottom: layoutMetrics.bottomPad,
    left: layoutMetrics.leftPad
  };
  const pad = activeCat === 'all' ? 30 : 10;
  baseScaleX = d3.scaleLinear().domain([0 - pad, 255 + pad]).range([margin.left, W - margin.right]);
  baseScaleY = d3.scaleLinear().domain([0 - pad, 255 + pad]).range([H - margin.bottom, margin.top]);
  markStaticCachesDirty();
}
function scheduleDraw(){
  if (drawScheduled) return;
  drawScheduled = true;
  requestAnimationFrame(() => { drawScheduled = false; draw(); });
}
function scheduleSync(resetZoom = false){
  syncResetZoom = syncResetZoom || resetZoom;
  if (syncScheduled) return;
  syncScheduled = true;
  requestAnimationFrame(() => {
    syncScheduled = false;
    resizeCanvas();
    buildScales();
    applyZoomBounds();
    if (syncResetZoom) {
      transform = d3.zoomIdentity;
      d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
    } else {
      draw();
    }
    syncResetZoom = false;
  });
}
function scheduleResizeDebounced(resetZoom = false){
  clearTimeout(scheduleResizeDebounced.t);
  scheduleResizeDebounced.t = setTimeout(() => scheduleSync(resetZoom), 80);
}

function markStaticCachesDirty(){
  gridCacheDirty = true;
  thumbCacheDirty = true;
  if (gridMode || thumbMode) scheduleDraw();
}
function scheduleGridCacheRebuild(){
  clearTimeout(gridRebuildTimer);
  gridRebuildTimer = setTimeout(() => {
    if (gridMode || thumbMode) {
      if (gridMode) gridCacheDirty = true;
      if (thumbMode) thumbCacheDirty = true;
      scheduleDraw();
    }
  }, 320);
}

function loadImg(fn){
  if (imgCache[fn]) return imgCache[fn];
  const img = new Image();
  img.decoding = 'async';
  img.src = 'images/' + fn;
  img.onload = () => {
    if (gridMode || thumbMode) {
      scheduleGridCacheRebuild();
    } else {
      scheduleDraw();
    }
  };
  img.onerror = () => {};
  imgCache[fn] = img;
  return img;
}
function warmImageCache(){
  const data = getFiltered();
  const budget = (gridMode || thumbMode) ? data.length : (isMobile() ? 90 : 160);
  for (let i = 0; i < Math.min(data.length, budget); i++) loadImg(data[i].filename);
}

function parseGroup(fn){ return fn.startsWith('ai_') ? 'AI' : fn.startsWith('human_') ? 'Human' : '?'; }
function parseCat(fn){
  const f = fn.toLowerCase();
  if (f.includes('portrait') || f.includes('portre')) return 'portrait';
  if (f.includes('landscape')) return 'landscape';
  if (f.includes('abstract') || f.includes('absract')) return 'abstract';
  if (f.includes('cityscape')) return 'cityscape';
  return 'unknown';
}
function getKeys(){
  if (currentAxes === 'bs') return { x: 'brightness_median', y: 'saturation_median', xL: 'Brightness', yL: 'Saturation' };
  if (currentAxes === 'bh') return { x: 'brightness_median', y: 'hue_median', xL: 'Brightness', yL: 'Hue' };
  return { x: 'saturation_median', y: 'hue_median', xL: 'Saturation', yL: 'Hue' };
}
function getFiltered(){
  return allData.filter(d => activeGroups.has(d.group) && (activeCat === 'all' || d.category === activeCat));
}
function getSortedGroupData(group){
  const cacheKey = `${currentAxes}|${activeCat}|${group}`;
  if (sortedCache.has(cacheKey)) return sortedCache.get(cacheKey);
  const base = allData.filter(d => d.group === group && (activeCat === 'all' || d.category === activeCat));
  const sortKeys = getGridSortKeys();
  base.sort((a, b) => {
    const pd = a[sortKeys.primary] - b[sortKeys.primary];
    if (Math.abs(pd) > 0.0001) return pd;
    return a[sortKeys.secondary] - b[sortKeys.secondary];
  });
  sortedCache.set(cacheKey, base);
  return base;
}
function getSortedThumbnailData(){
  const groupsKey = Array.from(activeGroups).sort().join('|');
  const cacheKey = `thumb|${currentAxes}|${activeCat}|${groupsKey}`;
  if (sortedCache.has(cacheKey)) return sortedCache.get(cacheKey);
  const base = getFiltered().slice();
  const sortKeys = getGridSortKeys();
  const groupOrder = { AI: 0, Human: 1 };
  const catOrder = { abstract: 0, cityscape: 1, landscape: 2, portrait: 3 };
  base.sort((a, b) => {
    const gd = (groupOrder[a.group] ?? 9) - (groupOrder[b.group] ?? 9);
    if (gd !== 0) return gd;
    if (activeCat === 'all') {
      const cd = (catOrder[a.category] ?? 9) - (catOrder[b.category] ?? 9);
      if (cd !== 0) return cd;
    }
    const pd = a[sortKeys.primary] - b[sortKeys.primary];
    if (Math.abs(pd) > 0.0001) return pd;
    return a[sortKeys.secondary] - b[sortKeys.secondary];
  });
  sortedCache.set(cacheKey, base);
  return base;
}
function clearSortedCache(){ sortedCache.clear(); }

function lerp(a,b,t){ return a + (b - a) * t; }
function clamp01(v){ return Math.max(0, Math.min(1, v)); }
function updateMiniNote(dataLength){ miniNote.textContent = `${dataLength} görsel`; }
function positionMiniNote(){
  const y = H - 8;
  const x = margin.left + (isMobile() ? 4 : 8);
  miniNote.style.top = `${y}px`;
  miniNote.style.left = `${x}px`;
}
function drawPlaceholderSquare(targetCtx, x, y, size, borderColor, alpha = 0.22){
  const half = size / 2;
  targetCtx.save();
  targetCtx.globalAlpha = alpha;
  targetCtx.fillStyle = 'rgba(255,255,255,0.04)';
  targetCtx.fillRect(x - half, y - half, size, size);
  targetCtx.strokeStyle = borderColor;
  targetCtx.lineWidth = Math.max(0.6, size * 0.03);
  targetCtx.strokeRect(x - half, y - half, size, size);
  targetCtx.restore();
}
function drawGroupDots(data, keys, zx, zy, alpha, size){
  if (alpha <= 0.01) return;
  ctx.globalAlpha = alpha;
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const x = zx(d[keys.x]);
    const y = zy(d[keys.y]);
    if (x < margin.left - 6 || x > W - margin.right + 6 || y < margin.top - 6 || y > H - margin.bottom + 6) continue;
    ctx.fillStyle = d.group === 'AI' ? AI_COLOR : HUMAN_COLOR;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawCategoryDots(data, keys, zx, zy, alpha, size){
  if (alpha <= 0.01) return;
  ctx.globalAlpha = alpha;
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const x = zx(d[keys.x]);
    const y = zy(d[keys.y]);
    if (x < margin.left - 6 || x > W - margin.right + 6 || y < margin.top - 6 || y > H - margin.bottom + 6) continue;
    ctx.fillStyle = catColors[d.category] || '#fff';
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawPhotos(data, keys, zx, zy, alpha, size){
  if (alpha <= 0.01) return;
  let drawn = 0;
  for (let i = 0; i < data.length; i++) {
    const d = data[i];
    const x = zx(d[keys.x]);
    const y = zy(d[keys.y]);
    if (x < margin.left - size || x > W - margin.right + size || y < margin.top - size || y > H - margin.bottom + size) continue;
    const img = loadImg(d.filename);
    if (img.complete && img.naturalWidth > 0 && drawn < 150) {
      const aspect = img.naturalHeight / img.naturalWidth;
      const iw = size;
      const ih = size * aspect;
      ctx.globalAlpha = alpha * 0.92;
      ctx.drawImage(img, x - iw / 2, y - ih / 2, iw, ih);
      ctx.strokeStyle = d.group === 'AI' ? 'rgba(35,198,211,0.78)' : 'rgba(255,159,67,0.78)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - iw / 2, y - ih / 2, iw, ih);
      ctx.globalAlpha = 1;
      drawn++;
    }
  }
}
function drawThumbSquare(targetCtx, img, x, y, size, borderColor, alpha){
  const sw = img.naturalWidth;
  const sh = img.naturalHeight;
  const s = Math.min(sw, sh);
  const sx = (sw - s) / 2;
  const sy = (sh - s) / 2;
  const half = size / 2;
  targetCtx.save();
  targetCtx.globalAlpha = alpha;
  targetCtx.drawImage(img, sx, sy, s, s, x - half, y - half, size, size);
  targetCtx.strokeStyle = borderColor;
  targetCtx.lineWidth = Math.max(0.7, size * 0.04);
  targetCtx.strokeRect(x - half, y - half, size, size);
  targetCtx.restore();
}

function rebuildThumbnailCache(){
  const gTop = layoutMetrics.gridTop;
  const gRight = layoutMetrics.gridRight;
  const gBottom = layoutMetrics.gridBottom;
  const gLeft = layoutMetrics.gridLeft;
  const plotW = W - gLeft - gRight;
  const plotH = H - gTop - gBottom;
  if (plotH <= 60 || plotW <= 60) return;

  thumbCacheCanvas.width = Math.round(W * DPR);
  thumbCacheCanvas.height = Math.round(H * DPR);
  thumbCacheCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  thumbCacheCtx.imageSmoothingEnabled = true;
  thumbCacheCtx.imageSmoothingQuality = 'low';
  thumbCacheCtx.clearRect(0, 0, W, H);
  thumbCacheCtx.fillStyle = '#000';
  thumbCacheCtx.fillRect(0, 0, W, H);

  drawGridBlock(thumbCacheCtx, getSortedThumbnailData(), gLeft, gTop, plotW, plotH);
  thumbCacheDirty = false;
}
function drawThumbnailMode(){
  const data = getFiltered();
  if (data.length === 0) return;
  if (thumbCacheDirty) rebuildThumbnailCache();
  if (!thumbCacheCanvas.width || !thumbCacheCanvas.height) return;
  ctx.drawImage(thumbCacheCanvas, 0, 0, W, H);
}
function getGridSortKeys(){
  if (currentAxes === 'bs') return { primary: 'brightness_median', secondary: 'saturation_median', label: 'Brightness / Saturation' };
  if (currentAxes === 'bh') return { primary: 'brightness_median', secondary: 'hue_median', label: 'Brightness / Hue' };
  return { primary: 'saturation_median', secondary: 'hue_median', label: 'Saturation / Hue' };
}
function calcGrid(count, areaW, areaH){
  if (count === 0) return { cols: 0, rows: 0, size: 0 };
  let bestSize = 0, bestCols = 1, bestRows = 1;
  for (let cols = 1; cols <= count; cols++) {
    const rows = Math.ceil(count / cols);
    const sizeByW = areaW / cols;
    const sizeByH = areaH / rows;
    const size = Math.min(sizeByW, sizeByH);
    if (size >= bestSize) {
      bestSize = size;
      bestCols = cols;
      bestRows = rows;
    }
  }
  return { cols: bestCols, rows: bestRows, size: Math.floor(bestSize * 100) / 100 };
}
function drawGridBlock(targetCtx, sorted, offsetX, offsetY, areaW, areaH){
  const g = calcGrid(sorted.length, areaW, areaH);
  if (g.cols === 0) return;
  const totalGridW = g.cols * g.size;
  const totalGridH = g.rows * g.size;
  const startX = offsetX + (areaW - totalGridW) / 2;
  const startY = offsetY + (areaH - totalGridH) / 2;
  const drawSize = g.size * 0.96;
  for (let i = 0; i < sorted.length; i++) {
    const d = sorted[i];
    const col = i % g.cols;
    const row = Math.floor(i / g.cols);
    const cx = startX + col * g.size + g.size / 2;
    const cy = startY + row * g.size + g.size / 2;
    const img = loadImg(d.filename);
    const borderColor = d.group === 'AI' ? 'rgba(35,198,211,0.55)' : 'rgba(255,159,67,0.55)';
    if (img.complete && img.naturalWidth) drawThumbSquare(targetCtx, img, cx, cy, drawSize, borderColor, 0.92);
    else drawPlaceholderSquare(targetCtx, cx, cy, drawSize, borderColor, 0.15);
  }
}
function rebuildGridCache(){
  const mob = isMobile();
  const gTop = layoutMetrics.gridTop;
  const gRight = layoutMetrics.gridRight;
  const gBottom = layoutMetrics.gridBottom;
  const gLeft = layoutMetrics.gridLeft;
  const plotW = W - gLeft - gRight;
  const plotH = H - gTop - gBottom;
  if (plotH <= 60 || plotW <= 60) return;

  gridCacheCanvas.width = Math.round(W * DPR);
  gridCacheCanvas.height = Math.round(H * DPR);
  gridCacheCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  gridCacheCtx.imageSmoothingEnabled = true;
  gridCacheCtx.imageSmoothingQuality = 'low';
  gridCacheCtx.clearRect(0, 0, W, H);
  gridCacheCtx.fillStyle = '#000';
  gridCacheCtx.fillRect(0, 0, W, H);

  const bothActive = activeGroups.has('AI') && activeGroups.has('Human');
  const gap = bothActive ? (mob ? 10 : 12) : 0;
  const availH = bothActive ? (plotH - gap) / 2 : plotH;

  const aiData = activeGroups.has('AI') ? getSortedGroupData('AI') : [];
  const huData = activeGroups.has('Human') ? getSortedGroupData('Human') : [];

  if (bothActive) {
    drawGridBlock(gridCacheCtx, aiData, gLeft, gTop, plotW, availH);
    drawGridBlock(gridCacheCtx, huData, gLeft, gTop + availH + gap, plotW, availH);
    gridCacheCtx.strokeStyle = 'rgba(255,255,255,0.06)';
    gridCacheCtx.lineWidth = 0.5;
    gridCacheCtx.beginPath();
    gridCacheCtx.moveTo(gLeft, gTop + availH + gap / 2);
    gridCacheCtx.lineTo(W - gRight, gTop + availH + gap / 2);
    gridCacheCtx.stroke();
  } else {
    const singleData = activeGroups.has('AI') ? aiData : huData;
    drawGridBlock(gridCacheCtx, singleData, gLeft, gTop, plotW, plotH);
  }

  const sortLabel = getGridSortKeys().label;
  gridCacheCtx.fillStyle = 'rgba(255,255,255,0.32)';
  gridCacheCtx.font = (mob ? '9' : '11') + 'px monospace';
  gridCacheCtx.textAlign = 'center';
  gridCacheCtx.fillText(sortLabel + ' →', W / 2, H - gBottom + (mob ? 12 : 18));
  gridCacheDirty = false;
}
function drawGridMode(){
  const data = getFiltered();
  if (data.length === 0) return;
  if (gridCacheDirty) rebuildGridCache();
  if (!gridCacheCanvas.width || !gridCacheCanvas.height) return;
  ctx.drawImage(gridCacheCanvas, 0, 0, W, H);
}

function drawAxes(zx, zy, keys){
  const mob = isMobile();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(margin.left, H - margin.bottom);
  ctx.lineTo(W - margin.right, H - margin.bottom);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, H - margin.bottom);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = (mob ? '9' : '11') + 'px monospace';
  ctx.textAlign = 'center';
  const tickCount = mob ? 5 : 8;
  zx.ticks(tickCount).forEach(t => {
    const x = zx(t);
    if (x >= margin.left && x <= W - margin.right) {
      ctx.beginPath();
      ctx.moveTo(x, H - margin.bottom);
      ctx.lineTo(x, H - margin.bottom + 5);
      ctx.stroke();
      ctx.fillText(Math.round(t), x, H - margin.bottom + (mob ? 14 : 18));
    }
  });
  ctx.textAlign = 'right';
  zy.ticks(tickCount).forEach(t => {
    const y = zy(t);
    if (y >= margin.top && y <= H - margin.bottom) {
      ctx.beginPath();
      ctx.moveTo(margin.left - 5, y);
      ctx.lineTo(margin.left, y);
      ctx.stroke();
      ctx.fillText(Math.round(t), margin.left - 6, y + 4);
    }
  });
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = (mob ? '10' : '13') + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(keys.xL, (margin.left + W - margin.right) / 2, H - (mob ? 4 : 12));
  ctx.save();
  ctx.translate(mob ? 10 : 16, (margin.top + H - margin.bottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(keys.yL, 0, 0);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  if (!baseScaleX || !baseScaleY) return;
  const data = getFiltered();
  const keys = getKeys();
  const zx = transform.rescaleX(baseScaleX);
  const zy = transform.rescaleY(baseScaleY);
  const k = transform.k;

  const CAT_START = 2.15;
  const CAT_FULL = 3.15;
  const PHOTO_START = 4.9;
  const PHOTO_FULL = 6.2;
  const catMix = clamp01((k - CAT_START) / (CAT_FULL - CAT_START));
  const photoMix = clamp01((k - PHOTO_START) / (PHOTO_FULL - PHOTO_START));

  if (!thumbMode && !gridMode) {
    if (catMix > 0.08) legendEl.classList.add('visible');
    else legendEl.classList.remove('visible');
  }

  updateMiniNote(data.length);
  positionMiniNote();

  if (gridMode) {
    legendEl.classList.remove('visible');
    drawGridMode();
    return;
  }

  if (thumbMode) {
    legendEl.classList.remove('visible');
    drawThumbnailMode();
    return;
  }

  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, W - margin.left - margin.right, H - margin.top - margin.bottom);
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  zx.ticks(10).forEach(t => {
    const x = zx(t);
    if (x >= margin.left && x <= W - margin.right) {
      ctx.beginPath();
      ctx.moveTo(x, margin.top);
      ctx.lineTo(x, H - margin.bottom);
      ctx.stroke();
    }
  });
  zy.ticks(10).forEach(t => {
    const y = zy(t);
    if (y >= margin.top && y <= H - margin.bottom) {
      ctx.beginPath();
      ctx.moveTo(margin.left, y);
      ctx.lineTo(W - margin.right, y);
      ctx.stroke();
    }
  });

  const groupAlpha = lerp(0.84, 0.22, catMix) * lerp(1, 0.2, photoMix);
  const groupSize = Math.max(1.3, Math.min(3.2, 1.2 * Math.min(k, 3)));
  drawGroupDots(data, keys, zx, zy, groupAlpha, groupSize);
  const catAlpha = Math.max(0, 0.16 + 0.78 * catMix) * lerp(1, 0.34, photoMix);
  const catSize = Math.max(1.3, 1.2 + 0.45 * Math.max(0, k - CAT_START));
  drawCategoryDots(data, keys, zx, zy, catAlpha, catSize);
  const photoAlpha = photoMix;
  const photoSize = Math.max(22, Math.min(62, 18 + (k - PHOTO_START) * 6));
  drawPhotos(data, keys, zx, zy, photoAlpha, photoSize);
  ctx.restore();
  drawAxes(zx, zy, keys);
}

const zoom = d3.zoom().scaleExtent([1, 25]).filter(() => !gridMode && !thumbMode);
function applyZoomBounds(){
  zoom
    .extent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
    .translateExtent([[margin.left, margin.top], [W - margin.right, H - margin.bottom]])
    .on('zoom', (event) => { transform = event.transform; draw(); });
  d3.select(canvas).call(zoom);
  canvas.style.cursor = (gridMode || thumbMode) ? 'default' : 'grab';
}
canvas.addEventListener('dblclick', () => {
  if (gridMode || thumbMode) return;
  transform = d3.zoomIdentity;
  d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
});
function updateUIForMode(){
  if (gridMode || thumbMode) legendEl.classList.remove('visible');
  dataToggle.style.display = '';
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const cat = btn.dataset.cat;
    thumbMode = false;
    gridMode = false;

    if (cat === 'thumbnail') {
      thumbMode = true;
      activeCat = 'all';
    } else if (cat === 'grid') {
      gridMode = true;
      activeCat = 'all';
    } else {
      activeCat = cat;
    }

    clearSortedCache();
    updateUIForMode();
    buildScales();
    applyZoomBounds();
    markStaticCachesDirty();
    warmImageCache();

    transform = d3.zoomIdentity;
    d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
  });
});

document.querySelectorAll('.grp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.g;
    if (activeGroups.has(g)) {
      if (activeGroups.size > 1) {
        activeGroups.delete(g);
        btn.className = 'grp-btn off';
      }
    } else {
      activeGroups.add(g);
      btn.className = 'grp-btn ' + (g === 'AI' ? 'ai-on' : 'hu-on');
    }
    clearSortedCache();
    warmImageCache();
    markStaticCachesDirty();
    draw();
  });
});

document.querySelectorAll('.data-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.data-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentAxes = btn.dataset.axes;
    transform = d3.zoomIdentity;
    clearSortedCache();
    markStaticCachesDirty();
    if (gridMode || thumbMode) {
      buildScales();
      applyZoomBounds();
      warmImageCache();
      draw();
    } else {
      d3.select(canvas).call(zoom.transform, d3.zoomIdentity);
    }
  });
});

async function loadData(){
  const resp = await fetch('measurements.txt');
  const text = await resp.text();
  const lines = text.trim().split('\n');
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split('\t');
    if (cols.length < 8) continue;
    const fn = cols[0].trim();
    if (!fn) continue;
    const bm = parseFloat(cols[2]);
    const sm = parseFloat(cols[4]);
    const hm = parseFloat(cols[6]);
    if (isNaN(bm) || isNaN(sm) || isNaN(hm)) continue;
    allData.push({
      filename: fn,
      group: parseGroup(fn),
      category: parseCat(fn),
      brightness_median: bm,
      saturation_median: sm,
      hue_median: hm
    });
  }
  scheduleSync(false);
  warmImageCache();
  updateMiniNote(allData.length);
  draw();
}

window.addEventListener('resize', () => scheduleResizeDebounced(false));
window.addEventListener('orientationchange', () => scheduleResizeDebounced(true));
document.addEventListener('gesturestart', e => e.preventDefault(), { passive:false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive:false });
document.addEventListener('gestureend', e => e.preventDefault(), { passive:false });
document.addEventListener('touchmove', e => {
  if (e.touches && e.touches.length > 1) e.preventDefault();
}, { passive:false });
loadData();
</script>
</body>
